# CodeFree Memory Team Configuration
# This file is auto-generated by the memory system on project initialization
version: 1  # Configuration format version (for future migration)
team:
  enabled: true
  memoryDir: ".codefree/memory/team"  # Team memory directory (relative to project root)
  vcs:
    track: true                   # Whether to track via VCS
    gitignore:
      exclude:
        - "*.private.md"            # Exclude private memory files
  scope:
    default: team                 # Default share level for new memories
    allowedScopes:
      - team
      - private
